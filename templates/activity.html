{% extends "base.html" %}
{% block content %}
<h4 class="mb-3">Журнал активности</h4>
{% if logs %}
<table class="table table-hover">
  <thead class="table-dark">
    <tr>
      <th>Пользователь</th>
      <th>Действие</th>
      <th>Время</th>
    </tr>
  </thead>
  <tbody>
    {% for entry in logs %}
    <tr>
      <td>{{ entry.user_name or entry.username or '—' }}</td>
      <td>{{ entry.action }}</td>
      <td><small class="text-muted">{{ entry.created_at }}</small></td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% else %}
<div class="alert alert-info">Журнал пуст</div>
{% endif %}
{% endblock %}
