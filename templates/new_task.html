{% extends "base.html" %}
{% block content %}
<h4 class="mb-3">Новая задача</h4>
<div class="card p-4" style="max-width:600px;">
  <form method="post">
    <div class="mb-3">
      <label class="form-label">Название *</label>
      <input class="form-control" name="title" required maxlength="100">
    </div>
    <div class="mb-3">
      <label class="form-label">Описание</label>
      <textarea class="form-control" name="description" rows="4"></textarea>
    </div>
    <div class="mb-3">
      <label class="form-label">Исполнитель</label>
      <select class="form-select" name="assignee_id">
        <option value="">— не назначен —</option>
        {% for u in users %}
        <option value="{{ u.id }}">{{ u.name or u.username }} ({{ u.role }})</option>
        {% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label">Дедлайн</label>
      <input class="form-control" type="date" name="deadline">
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-primary">Создать</button>
      <a href="/tasks" class="btn btn-outline-secondary">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
